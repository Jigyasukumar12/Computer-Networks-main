<svg viewBox="0 0 1000 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="500" y="40" font-size="28" font-weight="bold" text-anchor="middle" fill="#000">TCP Congestion Control Phases</text>
  <text x="500" y="70" font-size="14" text-anchor="middle" fill="#666">(Congestion Window Growth Over Time)</text>
  
  <!-- Axes -->
  <line x1="80" y1="650" x2="950" y2="650" stroke="#000" stroke-width="2"/>
  <line x1="80" y1="50" x2="80" y2="650" stroke="#000" stroke-width="2"/>
  
  <!-- Axis labels -->
  <text x="500" y="700" font-size="14" font-weight="bold" text-anchor="middle">RTT (Round Trip Time) / Time</text>
  <text x="20" y="350" font-size="14" font-weight="bold" text-anchor="middle" transform="rotate(-90 20 350)">cwnd (Congestion Window)</text>
  
  <!-- Y-axis scale -->
  <text x="60" y="655" font-size="11" text-anchor="end">0</text>
  <text x="60" y="555" font-size="11" text-anchor="end">32KB</text>
  <text x="60" y="455" font-size="11" text-anchor="end">64KB</text>
  <text x="60" y="355" font-size="11" text-anchor="end">96KB</text>
  <text x="60" y="255" font-size="11" text-anchor="end">128KB</text>
  
  <!-- X-axis scale -->
  <text x="80" y="675" font-size="11" text-anchor="middle">0</text>
  <text x="200" y="675" font-size="11" text-anchor="middle">2 RTT</text>
  <text x="350" y="675" font-size="11" text-anchor="middle">4 RTT</text>
  <text x="500" y="675" font-size="11" text-anchor="middle">6 RTT</text>
  <text x="650" y="675" font-size="11" text-anchor="middle">8 RTT</text>
  <text x="800" y="675" font-size="11" text-anchor="middle">10 RTT</text>
  
  <!-- SLOW START PHASE -->
  <text x="200" y="110" font-size="16" font-weight="bold" fill="#FF6B6B">PHASE 1: SLOW START</text>
  <text x="200" y="135" font-size="12" fill="#000">(Exponential Growth)</text>
  
  <!-- Slow start curve (exponential) -->
  <!-- Points: RTT0:1KB, RTT1:2KB, RTT2:4KB, RTT3:8KB, RTT4:16KB -->
  <circle cx="100" cy="635" r="4" fill="#FF6B6B"/>
  <circle cx="140" cy="615" r="4" fill="#FF6B6B"/>
  <circle cx="180" cy="575" r="4" fill="#FF6B6B"/>
  <circle cx="220" cy="495" r="4" fill="#FF6B6B"/>
  <circle cx="260" cy="335" r="4" fill="#FF6B6B"/>
  
  <polyline points="100,635 140,615 180,575 220,495 260,335" stroke="#FF6B6B" stroke-width="3" fill="none" stroke-dasharray="5,5"/>
  
  <!-- Threshold line -->
  <line x1="80" y1="435" x2="950" y2="435" stroke="#FFD700" stroke-width="2" stroke-dasharray="10,5"/>
  <text x="75" y="430" font-size="11" font-weight="bold" fill="#FFD700">ssthresh</text>
  
  <!-- CONGESTION AVOIDANCE PHASE -->
  <text x="450" y="110" font-size="16" font-weight="bold" fill="#4169E1">PHASE 2: CONGESTION AVOIDANCE</text>
  <text x="450" y="135" font-size="12" fill="#000">(Linear Growth)</text>
  
  <!-- Congestion avoidance curve (linear from ssthresh point) -->
  <circle cx="260" cy="335" r="4" fill="#4169E1"/>
  <circle cx="340" cy="315" r="4" fill="#4169E1"/>
  <circle cx="420" cy="295" r="4" fill="#4169E1"/>
  <circle cx="500" cy="275" r="4" fill="#4169E1"/>
  <circle cx="580" cy="255" r="4" fill="#4169E1"/>
  
  <polyline points="260,335 340,315 420,295 500,275 580,255" stroke="#4169E1" stroke-width="3" fill="none"/>
  
  <!-- TIMEOUT/PACKET LOSS event -->
  <line x1="580" y1="255" x2="580" y2="600" stroke="#FF0000" stroke-width="2" stroke-dasharray="5,5"/>
  <circle cx="580" cy="600" r="6" fill="#FF0000"/>
  <text x="580" y="630" font-size="12" font-weight="bold" text-anchor="middle" fill="#FF0000">Timeout!</text>
  <text x="580" y="645" font-size="10" text-anchor="middle" fill="#FF0000">cwnd = 1 MSS</text>
  
  <!-- Resume slow start after timeout -->
  <circle cx="620" cy="585" r="4" fill="#FF6B6B"/>
  <circle cx="660" cy="565" r="4" fill="#FF6B6B"/>
  <circle cx="700" cy="525" r="4" fill="#FF6B6B"/>
  <polyline points="580,600 620,585 660,565 700,525" stroke="#FF6B6B" stroke-width="3" fill="none" stroke-dasharray="5,5"/>
  
  <!-- Legend boxes -->
  <rect x="50" y="710" width="900" height="80" fill="#FFFACD" stroke="#DAA520" stroke-width="2" rx="5"/>
  
  <text x="70" y="735" font-size="12" font-weight="bold">BEHAVIOR:</text>
  <text x="70" y="760" font-size="11">• SLOW START (cwnd=1): Exponential growth (×2 each RTT) until ssthresh reached or packet loss detected</text>
  <text x="70" y="780" font-size="11">• CONGESTION AVOIDANCE (cwnd≥ssthresh): Linear growth (+1 MSS per RTT) until timeout occurs</text>
  
  <!-- Info boxes at bottom -->
  <rect x="150" y="280" width="120" height="70" fill="#FFE4E4" stroke="#FF6B6B" stroke-width="1" rx="3"/>
  <text x="210" y="295" font-size="10" font-weight="bold" text-anchor="middle">Slow Start</text>
  <text x="210" y="315" font-size="9" text-anchor="middle">cwnd += cwnd</text>
  <text x="210" y="330" font-size="9" text-anchor="middle">(doubles per RTT)</text>
  <text x="210" y="345" font-size="8" text-anchor="middle">Risk: Overshoot</text>
  
  <rect x="400" y="200" width="120" height="70" fill="#E6F0FF" stroke="#4169E1" stroke-width="1" rx="3"/>
  <text x="460" y="215" font-size="10" font-weight="bold" text-anchor="middle">Cong. Avoid</text>
  <text x="460" y="235" font-size="9" text-anchor="middle">cwnd += 1 MSS</text>
  <text x="460" y="250" font-size="9" text-anchor="middle">(per RTT)</text>
  <text x="460" y="265" font-size="8" text-anchor="middle">Probing for capacity</text>
  
  <rect x="700" y="380" width="120" height="70" fill="#FFCCCC" stroke="#FF0000" stroke-width="1" rx="3"/>
  <text x="760" y="395" font-size="10" font-weight="bold" text-anchor="middle">Timeout</text>
  <text x="760" y="415" font-size="9" text-anchor="middle">ssthresh = cwnd/2</text>
  <text x="760" y="430" font-size="9" text-anchor="middle">cwnd = 1 MSS</text>
  <text x="760" y="445" font-size="8" text-anchor="middle">Restart slow start</text>
  
  <!-- Key metrics explanation -->
  <text x="500" y="650" font-size="12" font-weight="bold" text-anchor="middle" fill="#008000">
    cwnd = Congestion Window  |  MSS = Maximum Segment Size  |  ssthresh = Slow Start Threshold
  </text>
</svg>