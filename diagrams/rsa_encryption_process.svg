<svg viewBox="0 0 1000 850" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="500" y="40" font-size="28" font-weight="bold" text-anchor="middle" fill="#000">RSA Asymmetric Cryptography Process</text>
  
  <!-- KEY GENERATION PHASE -->
  <text x="500" y="90" font-size="18" font-weight="bold" text-anchor="middle" fill="#FF6B6B">PHASE 1: KEY GENERATION</text>
  <rect x="50" y="110" width="900" height="200" fill="#FFE4E4" stroke="#FF6B6B" stroke-width="2" rx="5"/>
  
  <!-- Steps in key generation -->
  <text x="70" y="140" font-size="12" fill="#000">Step 1: Select two large primes: p = 61, q = 53</text>
  <text x="70" y="165" font-size="12" fill="#000">Step 2: Calculate n = p × q = 61 × 53 = 3233</text>
  <text x="70" y="190" font-size="12" fill="#000">Step 3: Calculate φ(n) = (p-1) × (q-1) = 60 × 52 = 3120</text>
  <text x="70" y="215" font-size="12" fill="#000">Step 4: Choose e (1 < e < φ(n)), gcd(e, φ(n)) = 1. Use e = 17</text>
  <text x="70" y="240" font-size="12" fill="#000">Step 5: Find d such that (d × e) mod φ(n) = 1. Solution: d = 2753</text>
  <text x="70" y="265" font-size="12" fill="#000">           (2753 × 17) mod 3120 = 46801 mod 3120 = 1 ✓</text>
  <text x="70" y="290" font-size="12" font-weight="bold" fill="#FF0000">Step 6: Public Key = (17, 3233)    Private Key = (2753, 3233)</text>
  
  <!-- ENCRYPTION PHASE -->
  <text x="500" y="350" font-size="18" font-weight="bold" text-anchor="middle" fill="#4169E1">PHASE 2: ENCRYPTION (Sender uses Recipient's Public Key)</text>
  
  <!-- Sender box -->
  <rect x="50" y="370" width="400" height="150" fill="#E6F0FF" stroke="#4169E1" stroke-width="2" rx="5"/>
  <text x="250" y="395" font-size="14" font-weight="bold" text-anchor="middle">SENDER (Alice)</text>
  <text x="70" y="425" font-size="11" fill="#000">1. Plaintext message: M = 65 (ASCII 'A')</text>
  <text x="70" y="450" font-size="11" fill="#000">2. Gets recipient's PUBLIC key: (e, n) = (17, 3233)</text>
  <text x="70" y="475" font-size="11" fill="#000">3. Encrypts using: C = M^e mod n</text>
  <text x="70" y="500" font-size="12" font-weight="bold" fill="#008000">   C = 65^17 mod 3233 = 2790</text>
  
  <!-- Transmission -->
  <text x="500" y="420" font-size="14" font-weight="bold" text-anchor="middle" fill="#000">SENDS CIPHERTEXT</text>
  <text x="500" y="445" font-size="12" text-anchor="middle" fill="#000">Ciphertext = 2790</text>
  <text x="500" y="470" font-size="12" text-anchor="middle" fill="#000">(Secure over unsecure channel)</text>
  
  <!-- Receiver box -->
  <rect x="550" y="370" width="400" height="150" fill="#FFFACD" stroke="#DAA520" stroke-width="2" rx="5"/>
  <text x="750" y="395" font-size="14" font-weight="bold" text-anchor="middle">RECEIVER (Bob)</text>
  <text x="570" y="425" font-size="11" fill="#000">1. Receives ciphertext: C = 2790</text>
  <text x="570" y="450" font-size="11" fill="#000">2. Has his PRIVATE key: (d, n) = (2753, 3233)</text>
  <text x="570" y="475" font-size="11" fill="#000">3. Decrypts using: M = C^d mod n</text>
  <text x="570" y="500" font-size="12" font-weight="bold" fill="#008000">   M = 2790^2753 mod 3233 = 65</text>
  
  <!-- SECURITY explanation -->
  <text x="500" y="560" font-size="16" font-weight="bold" text-anchor="middle" fill="#FF0000">WHY IS RSA SECURE?</text>
  <rect x="50" y="580" width="900" height="180" fill="#FFD700" stroke="#DAA520" stroke-width="2" rx="5"/>
  
  <text x="70" y="610" font-size="12" font-weight="bold" fill="#000">To break RSA, attacker must:</text>
  <text x="90" y="635" font-size="11" fill="#000">1. Have public key: (e, n) = (17, 3233)</text>
  <text x="90" y="660" font-size="11" fill="#000">2. Factor n into primes: 3233 = 61 × 53 (Easy with small numbers)</text>
  <text x="90" y="685" font-size="11" fill="#000">3. Calculate φ(n) = (61-1) × (53-1) = 3120</text>
  <text x="90" y="710" font-size="11" fill="#000">4. Find d: inverse of e mod φ(n), then decrypt C^d mod n</text>
  
  <text x="70" y="740" font-size="12" font-weight="bold" fill="#000">For REAL RSA: p and q are ~1024-bit primes, making n ~2048 bits</text>
  <text x="70" y="765" font-size="12" font-weight="bold" fill="#FF0000">Factoring 2048-bit n is computationally IMPOSSIBLE with current technology!</text>
  
  <!-- Comparison with symmetric -->
  <text x="500" y="800" font-size="14" font-weight="bold" text-anchor="middle" fill="#008000">RSA Advantage: No secure key exchange needed! Public key can be transmitted openly.</text>
</svg>