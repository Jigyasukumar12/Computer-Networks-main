<svg viewBox="0 0 1000 900" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="500" y="40" font-size="28" font-weight="bold" text-anchor="middle" fill="#000">DNS Resolution Process (4-Step Query)</text>
  <text x="500" y="70" font-size="14" text-anchor="middle" fill="#666">Example: Client wants to resolve www.google.com</text>
  
  <!-- Boxes for servers -->
  <!-- Client -->
  <rect x="50" y="120" width="120" height="80" fill="#FFB6C1" stroke="#000" stroke-width="2" rx="5"/>
  <text x="110" y="145" font-size="12" font-weight="bold" text-anchor="middle">CLIENT</text>
  <text x="110" y="170" font-size="10" text-anchor="middle">(User's Browser)</text>
  <text x="110" y="185" font-size="9" text-anchor="middle">Queries DNS</text>
  
  <!-- Recursive Resolver (ISP) -->
  <rect x="200" y="120" width="120" height="80" fill="#E6F0FF" stroke="#000" stroke-width="2" rx="5"/>
  <text x="260" y="145" font-size="12" font-weight="bold" text-anchor="middle">RECURSIVE</text>
  <text x="260" y="160" font-size="12" font-weight="bold" text-anchor="middle">RESOLVER</text>
  <text x="260" y="175" font-size="9" text-anchor="middle">(ISP DNS)</text>
  <text x="260" y="185" font-size="9" text-anchor="middle">Performs full lookup</text>
  
  <!-- Root Server -->
  <rect x="350" y="120" width="120" height="80" fill="#FFD700" stroke="#000" stroke-width="2" rx="5"/>
  <text x="410" y="145" font-size="12" font-weight="bold" text-anchor="middle">ROOT</text>
  <text x="410" y="160" font-size="12" font-weight="bold" text-anchor="middle">SERVER</text>
  <text x="410" y="175" font-size="9" text-anchor="middle">(TLD location)</text>
  <text x="410" y="185" font-size="9" text-anchor="middle">Top-level domain</text>
  
  <!-- TLD Server -->
  <rect x="500" y="120" width="120" height="80" fill="#90EE90" stroke="#000" stroke-width="2" rx="5"/>
  <text x="560" y="145" font-size="12" font-weight="bold" text-anchor="middle">TLD</text>
  <text x="560" y="160" font-size="12" font-weight="bold" text-anchor="middle">SERVER</text>
  <text x="560" y="175" font-size="9" text-anchor="middle">(.com, .org)</text>
  <text x="560" y="185" font-size="9" text-anchor="middle">Domain registry</text>
  
  <!-- Authoritative Server -->
  <rect x="650" y="120" width="140" height="80" fill="#87CEEB" stroke="#000" stroke-width="2" rx="5"/>
  <text x="720" y="145" font-size="12" font-weight="bold" text-anchor="middle">AUTHORITATIVE</text>
  <text x="720" y="160" font-size="12" font-weight="bold" text-anchor="middle">SERVER</text>
  <text x="720" y="175" font-size="9" text-anchor="middle">google.com's DNS</text>
  <text x="720" y="185" font-size="9" text-anchor="middle">Has A records</text>
  
  <!-- DNS Hierarchy Diagram -->
  <rect x="50" y="240" width="900" height="180" fill="#FFFACD" stroke="#DAA520" stroke-width="2" rx="5"/>
  <text x="500" y="265" font-size="14" font-weight="bold" text-anchor="middle">DNS HIERARCHY</text>
  
  <!-- Root at top -->
  <circle cx="500" cy="310" r="15" fill="#FFD700" stroke="#000" stroke-width="2"/>
  <text x="500" y="315" font-size="10" font-weight="bold" text-anchor="middle">.</text>
  <text x="500" y="335" font-size="11" text-anchor="middle" font-weight="bold">Root Server</text>
  
  <!-- TLDs -->
  <circle cx="350" cy="380" r="12" fill="#90EE90" stroke="#000" stroke-width="2"/>
  <text x="350" y="383" font-size="9" font-weight="bold" text-anchor="middle">.com</text>
  
  <circle cx="500" cy="380" r="12" fill="#90EE90" stroke="#000" stroke-width="2"/>
  <text x="500" y="383" font-size="9" font-weight="bold" text-anchor="middle">.org</text>
  
  <circle cx="650" cy="380" r="12" fill="#90EE90" stroke="#000" stroke-width="2"/>
  <text x="650" y="383" font-size="9" font-weight="bold" text-anchor="middle">.edu</text>
  
  <!-- Domains under .com -->
  <circle cx="300" cy="420" r="10" fill="#87CEEB" stroke="#000" stroke-width="2"/>
  <text x="300" y="423" font-size="8" font-weight="bold" text-anchor="middle">google</text>
  
  <circle cx="380" cy="420" r="10" fill="#87CEEB" stroke="#000" stroke-width="2"/>
  <text x="380" y="423" font-size="8" font-weight="bold" text-anchor="middle">amazon</text>
  
  <!-- Lines connecting hierarchy -->
  <line x1="500" y1="325" x2="350" y2="368" stroke="#000" stroke-width="1"/>
  <line x1="500" y1="325" x2="500" y2="368" stroke="#000" stroke-width="1"/>
  <line x1="500" y1="325" x2="650" y2="368" stroke="#000" stroke-width="1"/>
  <line x1="350" y1="392" x2="300" y2="410" stroke="#000" stroke-width="1"/>
  <line x1="350" y1="392" x2="380" y2="410" stroke="#000" stroke-width="1"/>
  
  <!-- Step-by-step resolution -->
  <text x="500" y="480" font-size="16" font-weight="bold" text-anchor="middle">RESOLUTION STEPS</text>
  
  <!-- Step 1 -->
  <rect x="50" y="510" width="880" height="60" fill="#FFE4E4" stroke="#FF6B6B" stroke-width="2" rx="5"/>
  <text x="70" y="530" font-size="12" font-weight="bold">STEP 1:</text>
  <text x="70" y="555" font-size="11">Client asks Recursive Resolver: "What's the IP of www.google.com?"</text>
  
  <!-- Step 2 -->
  <rect x="50" y="580" width="880" height="60" fill="#E6F0FF" stroke="#4169E1" stroke-width="2" rx="5"/>
  <text x="70" y="600" font-size="12" font-weight="bold">STEP 2:</text>
  <text x="70" y="625" font-size="11">Resolver asks Root Server: "Where can I find google.com?" → Root: "Ask TLD server for .com"</text>
  
  <!-- Step 3 -->
  <rect x="50" y="650" width="880" height="60" fill="#FFFACD" stroke="#DAA520" stroke-width="2" rx="5"/>
  <text x="70" y="670" font-size="12" font-weight="bold">STEP 3:</text>
  <text x="70" y="695" font-size="11">Resolver asks TLD server: "Where is google.com?" → TLD: "Ask Authoritative server at 216.239.32.10"</text>
  
  <!-- Step 4 -->
  <rect x="50" y="720" width="880" height="60" fill="#90EE90" stroke="#008000" stroke-width="2" rx="5"/>
  <text x="70" y="740" font-size="12" font-weight="bold">STEP 4:</text>
  <text x="70" y="765" font-size="11">Resolver asks Authoritative server: "What's the IP of www.google.com?" → "142.251.32.14"</text>
  
  <!-- Final result -->
  <rect x="50" y="795" width="880" height="60" fill="#FFD700" stroke="#DAA520" stroke-width="3" rx="5"/>
  <text x="500" y="815" font-size="12" font-weight="bold" text-anchor="middle">RESULT: Resolver returns IP 142.251.32.14 to Client</text>
  <text x="500" y="840" font-size="11" text-anchor="middle">Client caches this IP (TTL = Time to Live, typically 300-3600 seconds)</text>
  <text x="500" y="860" font-size="11" text-anchor="middle">Total time: 200-500 ms (first query), <1 ms (cached)</text>
</svg>