<svg viewBox="0 0 1000 850" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="500" y="40" font-size="28" font-weight="bold" text-anchor="middle" fill="#000">Sliding Window Protocol</text>
  <text x="500" y="70" font-size="14" text-anchor="middle" fill="#666">(Sender and Receiver Window Movement)</text>
  
  <!-- SENDER WINDOW -->
  <text x="500" y="120" font-size="16" font-weight="bold" text-anchor="middle" fill="#FF6B6B">SENDER'S VIEW</text>
  
  <!-- Sender sequence numbers -->
  <text x="50" y="155" font-size="11" fill="#000">Seq #:</text>
  <rect x="100" y="145" width="25" height="25" fill="#E8F5E9" stroke="#000" stroke-width="1"/>
  <text x="112" y="165" font-size="10" text-anchor="middle">0</text>
  <rect x="125" y="145" width="25" height="25" fill="#E8F5E9" stroke="#000" stroke-width="1"/>
  <text x="137" y="165" font-size="10" text-anchor="middle">1</text>
  <rect x="150" y="145" width="25" height="25" fill="#E8F5E9" stroke="#000" stroke-width="1"/>
  <text x="162" y="165" font-size="10" text-anchor="middle">2</text>
  <rect x="175" y="145" width="25" height="25" fill="#E8F5E9" stroke="#000" stroke-width="1"/>
  <text x="187" y="165" font-size="10" text-anchor="middle">3</text>
  <rect x="200" y="145" width="25" height="25" fill="#FFE4E4" stroke="#FF6B6B" stroke-width="2"/>
  <text x="212" y="165" font-size="10" text-anchor="middle">4</text>
  <rect x="225" y="145" width="25" height="25" fill="#FFE4E4" stroke="#FF6B6B" stroke-width="2"/>
  <text x="237" y="165" font-size="10" text-anchor="middle">5</text>
  <rect x="250" y="145" width="25" height="25" fill="#FFE4E4" stroke="#FF6B6B" stroke-width="2"/>
  <text x="262" y="165" font-size="10" text-anchor="middle">6</text>
  <rect x="275" y="145" width="25" height="25" fill="#E0E0E0" stroke="#999" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="287" y="165" font-size="10" text-anchor="middle">7</text>
  <rect x="300" y="145" width="25" height="25" fill="#E0E0E0" stroke="#999" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="312" y="165" font-size="10" text-anchor="middle">8</text>
  
  <!-- Window bracket for sender -->
  <line x1="200" y1="125" x2="250" y2="125" stroke="#FF6B6B" stroke-width="2"/>
  <line x1="200" y1="120" x2="200" y2="130" stroke="#FF6B6B" stroke-width="2"/>
  <line x1="250" y1="120" x2="250" y2="130" stroke="#FF6B6B" stroke-width="2"/>
  <text x="225" y="115" font-size="11" font-weight="bold" text-anchor="middle" fill="#FF6B6B">Sender Window (WS=3)</text>
  
  <!-- Sender labels -->
  <text x="80" y="195" font-size="10" fill="#000">ACK'd and sent ✓</text>
  <text x="200" y="195" font-size="10" fill="#FF6B6B">In-flight (can retransmit)</text>
  <text x="300" y="195" font-size="10" fill="#999">Cannot send yet</text>
  
  <!-- RECEIVER WINDOW -->
  <text x="500" y="260" font-size="16" font-weight="bold" text-anchor="middle" fill="#4169E1">RECEIVER'S VIEW</text>
  
  <!-- Receiver sequence numbers -->
  <text x="50" y="295" font-size="11" fill="#000">Seq #:</text>
  <rect x="100" y="285" width="25" height="25" fill="#E8F5E9" stroke="#000" stroke-width="1"/>
  <text x="112" y="305" font-size="10" text-anchor="middle">0</text>
  <rect x="125" y="285" width="25" height="25" fill="#E8F5E9" stroke="#000" stroke-width="1"/>
  <text x="137" y="305" font-size="10" text-anchor="middle">1</text>
  <rect x="150" y="285" width="25" height="25" fill="#E8F5E9" stroke="#000" stroke-width="1"/>
  <text x="162" y="305" font-size="10" text-anchor="middle">2</text>
  <rect x="175" y="285" width="25" height="25" fill="#E8F5E9" stroke="#000" stroke-width="1"/>
  <text x="187" y="305" font-size="10" text-anchor="middle">3</text>
  <rect x="200" y="285" width="25" height="25" fill="#E6F0FF" stroke="#4169E1" stroke-width="2"/>
  <text x="212" y="305" font-size="10" text-anchor="middle">4</text>
  <rect x="225" y="285" width="25" height="25" fill="#E6F0FF" stroke="#4169E1" stroke-width="2"/>
  <text x="237" y="305" font-size="10" text-anchor="middle">5</text>
  <rect x="250" y="285" width="25" height="25" fill="#E6F0FF" stroke="#4169E1" stroke-width="2"/>
  <text x="262" y="305" font-size="10" text-anchor="middle">6</text>
  <rect x="275" y="285" width="25" height="25" fill="#E0E0E0" stroke="#999" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="287" y="305" font-size="10" text-anchor="middle">7</text>
  
  <!-- Window bracket for receiver -->
  <line x1="200" y1="265" x2="250" y2="265" stroke="#4169E1" stroke-width="2"/>
  <line x1="200" y1="260" x2="200" y2="270" stroke="#4169E1" stroke-width="2"/>
  <line x1="250" y1="260" x2="250" y2="270" stroke="#4169E1" stroke-width="2"/>
  <text x="225" y="255" font-size="11" font-weight="bold" text-anchor="middle" fill="#4169E1">Receiver Window (WR=3)</text>
  
  <!-- Receiver labels -->
  <text x="80" y="335" font-size="10" fill="#000">Received and ACK'd</text>
  <text x="200" y="335" font-size="10" fill="#4169E1">Ready to receive</text>
  <text x="300" y="335" font-size="10" fill="#999">Not ready</text>
  
  <!-- WINDOW MOVEMENT STEPS -->
  <text x="500" y="390" font-size="14" font-weight="bold" text-anchor="middle" fill="#000">WINDOW MOVEMENT AFTER ACK OF PACKET 4</text>
  
  <!-- Step 1: Before -->
  <rect x="50" y="410" width="450" height="140" fill="#FFFACD" stroke="#DAA520" stroke-width="2" rx="5"/>
  <text x="275" y="435" font-size="12" font-weight="bold" text-anchor="middle">BEFORE: Packets 4,5,6 in-flight</text>
  
  <text x="70" y="465" font-size="11" fill="#000">Sender: packets 0-3 ACK'd ✓, packets 4-6 sent, can send up to 6</text>
  <text x="70" y="490" font-size="11" fill="#000">Receiver: got 0-3 ✓, waiting for 4 (ready to accept 4-6)</text>
  <text x="70" y="515" font-size="11" fill="#000">Status: Packet 4 received, others in-flight or dropped</text>
  <text x="70" y="540" font-size="11" font-weight="bold" fill="#008000">Receiver sends ACK(5) = "got up to 4, next expected is 5"</text>
  
  <!-- Arrow -->
  <path d="M 500 550 L 500 600" stroke="#FF0000" stroke-width="2" marker-end="url(#arrowRed)"/>
  
  <!-- Step 2: After -->
  <rect x="500" y="410" width="450" height="140" fill="#E6F0FF" stroke="#4169E1" stroke-width="2" rx="5"/>
  <text x="725" y="435" font-size="12" font-weight="bold" text-anchor="middle">AFTER: ACK received</text>
  
  <text x="520" y="465" font-size="11" fill="#000">Sender: moves window right! Now can send 7,8,9,10</text>
  <text x="520" y="490" font-size="11" fill="#000">Receiver: moves window right! Ready to accept 5,6,7</text>
  <text x="520" y="515" font-size="11" fill="#000">Status: Window slides forward</text>
  <text x="520" y="540" font-size="11" font-weight="bold" fill="#008000">Sender immediately sends packets 7,8,9 (from new window)</text>
  
  <!-- Key concepts box -->
  <rect x="50" y="570" width="900" height="260" fill="#E8F5E9" stroke="#008000" stroke-width="2" rx="5"/>
  <text x="500" y="600" font-size="14" font-weight="bold" text-anchor="middle" fill="#000">SLIDING WINDOW PROTOCOL - KEY CONCEPTS</text>
  
  <text x="70" y="630" font-size="12" font-weight="bold" fill="#000">Window Size (N):</text>
  <text x="70" y="655" font-size="11" fill="#000">• Maximum number of frames that can be transmitted before waiting for ACK</text>
  <text x="70" y="675" font-size="11" fill="#000">• Larger window = higher throughput, more buffer needed</text>
  <text x="70" y="695" font-size="11" fill="#000">• Window size must be ≥ 1 + 2(Tp/Tt) for optimal link utilization</text>
  
  <text x="70" y="725" font-size="12" font-weight="bold" fill="#000">Sender Window:</text>
  <text x="70" y="750" font-size="11" fill="#000">• Ranges from last ACK'd frame to last frame that can be sent</text>
  <text x="70" y="770" font-size="11" fill="#000">• Slides right when ACK received (moves right by ACK value)</text>
  
  <text x="500" y="725" font-size="12" font-weight="bold" fill="#000">Receiver Window:</text>
  <text x="500" y="750" font-size="11" fill="#000">• Ranges from next expected frame to last frame that can be accepted</text>
  <text x="500" y="770" font-size="11" fill="#000">• Slides right when correct frame received in sequence</text>
  
  <text x="70" y="800" font-size="11" font-weight="bold" fill="#FF6B6B">Efficiency = N / (1 + 2a), where a = Propagation delay / Transmission delay</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#FF0000"/>
    </marker>
  </defs>
</svg>